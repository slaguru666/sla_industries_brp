name: Build and Attach Foundry World Zip

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-release-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist
          zip -r dist/sla-brp.zip sla-brp -x "*.DS_Store"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sla-brp.zip
